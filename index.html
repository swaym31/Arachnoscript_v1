<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14130f">
<title>Arachnoscript Keypad</title>
<style>
/* Embedded so the single file runs on a phone with no server.
   To use your repo asset instead, swap the src below for:
   src: url('assets/ArachnoscriptText-Regular.woff2') format('woff2'); */
@font-face{font-family:'Arachnoscript Text';src:url('assets/ArachnoscriptText-Regular.woff2') format('woff2'), url('assets/ArachnoscriptText-Regular.ttf') format('truetype');font-display:swap;}
:root{
  --bg:#14130f; --panel:#1c1a14; --key:#242017; --key2:#2c2719;
  --ink:#ece5d6; --muted:#8c8474; --line:#39342a; --accent:#d29442;
  --fn:#211d15;
  --serif:Georgia,'Iowan Old Style','Times New Roman',serif;
  --mono:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{background:var(--bg);color:var(--ink);min-height:100vh;min-height:100dvh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  display:flex;justify-content:center;}
.phone{width:100%;max-width:460px;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  padding:14px 12px calc(12px + env(safe-area-inset-bottom));gap:12px;}
 
header{padding:6px 4px 0;}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--accent);margin:0 0 4px;}
header h1{font-family:var(--serif);font-weight:500;font-size:18px;margin:0;}
 
.screen{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:14px 14px 10px;display:flex;flex-direction:column;gap:8px;
  flex:1 1 0;min-height:120px;}
.displaywrap{flex:1 1 auto;min-height:0;display:flex;align-items:center;overflow:auto;}
.bar{display:flex;align-items:center;gap:8px;}
.bar .sp{flex:1;}
.tbtn{appearance:none;border:1px solid var(--line);background:transparent;color:var(--muted);
  font:inherit;font-size:12px;padding:5px 11px;border-radius:8px;cursor:pointer;
  touch-action:manipulation;user-select:none;transition:.15s;}
.tbtn:active{transform:scale(.96);}
.tbtn.on{color:#1a160f;background:var(--accent);border-color:var(--accent);font-weight:600;}
.flash{color:var(--accent)!important;border-color:var(--accent)!important;}
 
.output{width:100%;font-family:'Arachnoscript Text';font-size:clamp(34px,9vw,52px);
  line-height:1.22;min-height:1.3em;word-break:break-word;white-space:pre-wrap;display:block;}
.caret{display:inline-block;width:2px;height:1em;background:var(--accent);
  vertical-align:-0.15em;margin-left:1px;animation:blink 1.05s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}
.latin{font-family:var(--mono);font-size:12px;color:var(--muted);word-break:break-word;
  min-height:1em;}
.latin.hide{display:none;}
.latin .ph{opacity:.55;}
 
.keyboard{flex:1 1 0;min-height:0;display:flex;flex-direction:column;
  justify-content:center;gap:7px;
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  background:var(--panel);border:1px solid var(--line);border-radius:16px;}
.krow{display:flex;gap:6px;justify-content:center;}
.key{flex:1 1 0;min-width:0;height:clamp(46px,7.2vh,68px);border:1px solid var(--line);border-radius:9px;
  background:var(--key);color:var(--ink);display:flex;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;
  font-size:13px;transition:background .08s,transform .04s;}
.key:active{background:var(--accent);color:#1a160f;transform:translateY(1px);}
.key.glyph{font-family:'Arachnoscript Text';font-size:clamp(24px,4.6vh,32px);}
.key.fn{flex:1.5 1 0;background:var(--fn);color:var(--muted);font-size:15px;}
.key.space{flex:5 1 0;}
.key.wide{flex:1.5 1 0;}
 
footer{padding:2px 6px 0;color:var(--muted);font-size:12px;line-height:1.45;}
footer b{color:var(--ink);font-weight:600;}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style></head>
<body>
<div class="phone">
  <header>
    <p class="eyebrow">Arachnoscript · Keypad</p>
    <h1>Tap to write in Arachnoscript</h1>
  </header>
 
  <div class="screen">
    <div class="bar">
      <button class="tbtn" id="copy">Copy</button>
      <button class="tbtn" id="clear">Clear</button>
      <span class="sp"></span>
      <button class="tbtn on" id="toglatin">Latin</button>
    </div>
    <div class="displaywrap"><div class="output" id="out"><span class="caret"></span></div></div>
    <div class="latin" id="latin"><span class="ph">latin readout</span></div>
  </div>
 
  <div class="keyboard" id="kb"></div>
 
  <footer>
    Keys show your glyphs; tapping inserts the letter. <b>Copy</b> grabs the text as plain
    letters — paste it anywhere using the Arachnoscript font and it shows as glyphs.
  </footer>
</div>
 
<script>
(function(){
  var buffer="";
  var out=document.getElementById('out'),
      latin=document.getElementById('latin'),
      kb=document.getElementById('kb');
 
  function render(){
    out.textContent="";
    if(buffer) out.appendChild(document.createTextNode(buffer));
    var c=document.createElement('span'); c.className='caret'; out.appendChild(c);
    if(buffer){ latin.textContent=buffer; }
    else { latin.innerHTML='<span class="ph">latin readout</span>'; }
  }
  function insert(ch){ buffer+=ch; render(); }
  function del(){ if(buffer){ buffer=buffer.slice(0,-1); render(); } }
 
  // build keyboard from layout
  var rows=[
    {keys:"1234567890".split("")},
    {keys:"qwertyuiop".split("")},
    {keys:"asdfghjkl".split("")},
    {keys:"zxcvbnm".split(""), trail:[{a:'backspace',cls:'fn wide',label:'\u232B'}]},
    {lead:[{ch:'.',cls:'glyph'},{ch:',',cls:'glyph'}],
     keys:[], mid:[{a:'space',cls:'fn space',label:'space'}],
     trail:[{ch:'!',cls:'glyph'},{ch:'?',cls:'glyph'}]}
  ];
  rows.forEach(function(r){
    var row=document.createElement('div'); row.className='krow';
    (r.lead||[]).forEach(function(o){ row.appendChild(mk(o)); });
    (r.keys||[]).forEach(function(ch){ row.appendChild(mk({ch:ch,cls:'glyph'})); });
    (r.mid||[]).forEach(function(o){ row.appendChild(mk(o)); });
    (r.trail||[]).forEach(function(o){ row.appendChild(mk(o)); });
    kb.appendChild(row);
  });
  function mk(o){
    var b=document.createElement('button'); b.type='button';
    b.className='key'+(o.cls?(' '+o.cls):'');
    if(o.a){ b.dataset.action=o.a; b.textContent=o.label||''; }
    else { b.dataset.key=o.ch; b.textContent=o.ch; }
    return b;
  }
 
  // press handling (snappy, no zoom / no native keyboard)
  var holdTimer=null, holdInt=null;
  function press(b){
    if(b.dataset.action==='space') insert(' ');
    else if(b.dataset.action==='backspace') del();
    else if(b.dataset.key!=null) insert(b.dataset.key);
  }
  kb.addEventListener('pointerdown', function(e){
    var b=e.target.closest('.key'); if(!b) return;
    e.preventDefault();
    press(b);
    if(b.dataset.action==='backspace'){           // hold to repeat-delete
      holdTimer=setTimeout(function(){ holdInt=setInterval(del,55); },420);
    }
  });
  function stopHold(){ clearTimeout(holdTimer); clearInterval(holdInt); holdTimer=holdInt=null; }
  ['pointerup','pointercancel','pointerleave'].forEach(function(ev){
    kb.addEventListener(ev, stopHold);
  });
 
  // toolbar
  document.getElementById('clear').addEventListener('click',function(){ buffer=""; render(); });
  document.getElementById('toglatin').addEventListener('click',function(){
    latin.classList.toggle('hide'); this.classList.toggle('on',!latin.classList.contains('hide'));
  });
  document.getElementById('copy').addEventListener('click',function(){
    var self=this, txt=buffer;
    function ok(){ self.classList.add('flash'); self.textContent='Copied';
      setTimeout(function(){ self.classList.remove('flash'); self.textContent='Copy'; },900); }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(ok,fallback);
    } else fallback();
    function fallback(){
      var ta=document.createElement('textarea'); ta.value=txt;
      ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
      ta.focus(); ta.select();
      try{ document.execCommand('copy'); ok(); }catch(e){}
      document.body.removeChild(ta);
    }
  });
 
  render();
})();
</script>
</body></html>
